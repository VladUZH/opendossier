name: Feature request / idea
description: Suggest a source connector, an export, an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: The use case or pain point — not just the solution.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Source connector (search/fetch)
        - LLM provider
        - Heuristic extraction
        - Export / CLI
        - Web UI
        - Other
