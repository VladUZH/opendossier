services:
  opendossier:
    # Builds from source by default. To use the prebuilt multi-arch image instead
    # (published to GHCR on every release), comment out `build:` and run
    # `docker compose pull && docker compose up`:
    #   image: ghcr.io/vladuzh/opendossier:latest
    build: .
    image: opendossier
    ports:
      - "3000:3000"
    environment:
      # Defaults to the zero-key heuristic engine. Override here or in .env.local.
      LLM_PROVIDER: ${LLM_PROVIDER:-heuristic}
      NEXT_TELEMETRY_DISABLED: "1"
    # Optional: drop your keys in .env.local (gitignored) to use an LLM.
    env_file:
      - path: .env.local
        required: false
    # Your dossier corpus persists on the host and stays human-readable.
    volumes:
      - ./data:/app/data
    restart: unless-stopped
